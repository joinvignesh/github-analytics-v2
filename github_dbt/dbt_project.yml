# ============================================
# dbt Project Configuration
# GitHub Analytics Platform
# ============================================

name: 'github_dbt'
version: '1.0.0'
config-version: 2

# Profile to use (matches profiles.yml)
profile: 'github_dbt'

# Source and target directories
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

# Build artifacts
target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# Model configuration
models:
  github_dbt:
    
    # Staging models: Views on raw data with typed columns
    staging:
      +materialized: view
      +schema: staging
      +docs:
        node_color: "#8BC34A"
    
    # Intermediate models: Business logic, calculations
    intermediate:
      +materialized: table
      +schema: intermediate
      +docs:
        node_color: "#FF9800"
    
    # Marts: Analytics-ready denormalized tables
    marts:
      +materialized: table
      +schema: marts
      +docs:
        node_color: "#2196F3"
      
      # Incremental loading for fact tables
      core:
        +materialized: incremental
        +unique_key: id
        +on_schema_change: "append_new_columns"

# Seeds configuration
seeds:
  github_dbt:
    +schema: seeds

# Snapshot configuration
snapshots:
  github_dbt:
    +target_schema: snapshots

# Vars (variables accessible in models)
vars:
  # Date range for incremental models
  start_date: '2026-01-01'
  
  # Repositories to include
  repositories:
    - 'apache/airflow'
    - 'dbt-labs/dbt-core'